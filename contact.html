<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <title> Medicure </title>
</head>
<body>
    
     <!--  Navbar -->
<nav class="relative w-full px-6 py-4 bg-white border-b border-stone-200 shadow-sm flex flex-wrap items-center justify-between">
    
    <!-- Brand Logo Section -->
    <div class="flex items-center">
        <img src="images/Screenshot 2026-06-23 201939.png" alt="Logo" class="w-12 h-12 rounded-sm object-cover mr-3 border border-stone-200 shadow-sm">
        <h1 class="text-2xl font-serif font-semibold text-stone-900 tracking-tight"> 
            <span class="text-emerald-700 text-3xl font-bold">M</span>edicure 
        </h1>
    </div>

    <!-- Mobile Menu Button -->
    <button id="menu-button" class="text-stone-700 md:hidden text-sm uppercase tracking-wider font-serif border border-stone-300 px-4 py-2 rounded-sm hover:bg-stone-50 cursor-pointer transition-colors duration-300"> 
        Menu 
    </button>

    <!-- Navigation Links Container -->
    <div id="nav-link" class="hidden md:flex flex-col md:flex-row items-center w-full md:w-auto text-base gap-1 md:gap-2 p-6 md:p-0 absolute md:static top-[100%] left-0 bg-white md:bg-transparent border-t border-stone-100 md:border-none z-50">
        
        <a href="index.html" class="text-stone-600 font-serif px-4 py-2 rounded-sm hover:text-emerald-700 hover:bg-stone-50 tracking-wide transition-all duration-200">Home</a>
        
        
        <a href="about.html" class="text-stone-600 font-serif px-4 py-2 rounded-sm hover:text-emerald-700 hover:bg-stone-50 tracking-wide transition-all duration-200">About</a>
        <a href="service.html" class="text-stone-600 font-serif px-4 py-2 rounded-sm hover:text-emerald-700 hover:bg-stone-50 tracking-wide transition-all duration-200">Services</a>
        <a href="#" class="text-stone-600 font-serif px-4 py-2 rounded-sm hover:text-emerald-700 hover:bg-stone-50 tracking-wide transition-all duration-200">Contact</a>
        
        <!-- Premium Action Button -->
        <a href="appointment.html" class="mt-4 md:mt-0 text-white text-sm uppercase tracking-widest font-serif py-2.5 px-6 bg-emerald-800 hover:bg-emerald-900 rounded-sm shadow-md transition-all duration-200 ml-2"> 
            Appointments 
        </a>
    </div>
</nav>

<!-- Contact & Appointment Section (Premium Light Theme) -->
<section class="bg-slate-50 py-24 px-6 sm:px-12 mt-10 border-t border-slate-200">
    <div class="max-w-7xl mx-auto">
        
        <!-- Section Header -->
        <div class="mb-16 space-y-4">
            <!-- Light Mode Badge: Soft green background with dark green text -->
            <span class="inline-block text-xs font-bold uppercase tracking-widest text-emerald-700 bg-emerald-100 border border-emerald-200 px-4 py-1.5 rounded-full font-sans">
                Contact Us
            </span>
            <h2 class="text-3xl sm:text-4xl lg:text-5xl text-slate-900 font-bold font-serif leading-tight">
                Get in touch to book your <br class="hidden sm:inline">first appointment
            </h2>
            <div class="h-1 w-12 bg-emerald-500 rounded-full"></div>
        </div>

        <!-- Main Container Split -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16 items-start">
            
            <!-- Left Column: Office Details (Clean White Card) -->
            <div class="lg:col-span-2 space-y-8">
                <div class="p-8 bg-white border border-slate-200 rounded-2xl space-y-6 shadow-sm">
                    <div>
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-500 font-sans mb-1">Direct Call</h3>
                        <p class="text-2xl font-bold text-slate-900 font-mono hover:text-emerald-600 transition-colors cursor-pointer">123456</p>
                    </div>
                    
                    <div class="border-t border-slate-100 pt-6">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-500 font-sans mb-1">Email Inquiry</h3>
                        <a href="mailto:contact@gmail.com" class="text-xl font-bold text-emerald-600 font-sans hover:text-emerald-700 hover:underline transition-colors block">
                            contact@gmail.com
                        </a>
                    </div>
                </div>
            </div>

            <!-- Right Column: Interactive Form (Crisp & Clear Elements) -->
            <form class="lg:col-span-3 bg-white border border-slate-200 p-8 sm:p-10 rounded-2xl space-y-6 shadow-md">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- First Name -->
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wide text-slate-700 uppercase font-sans">First Name</label>
                        <input type="text" placeholder="e.g. David" required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-sans text-sm placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 focus:bg-white transition-all">
                    </div>
                    
                    <!-- Last Name -->
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wide text-slate-700 uppercase font-sans">Last Name</label>
                        <input type="text" placeholder="e.g. Miller" required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-sans text-sm placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 focus:bg-white transition-all">
                    </div>
                </div>

                <!-- Message -->
                <div class="space-y-2">
                    <label for="msg" class="block text-xs font-semibold tracking-wide text-slate-700 uppercase font-sans">Message</label>
                    <textarea id="msg" rows="5" placeholder="Type your message here..." required
                              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-sans text-sm placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 focus:bg-white transition-all resize-none"></textarea>
                </div>

                <!-- Action Button -->
                <div class="pt-2">
                    <button type="submit" 
                            class="w-full sm:w-auto px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-serif text-sm font-medium uppercase tracking-widest rounded-xl shadow-md hover:shadow-lg transition-all duration-200 transform active:scale-[0.98]">
                        Submit Details
                    </button>
                </div>
            </form>

        </div>
    </div>
</section>




    <script src="app.js"></script>
 <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000, // Animation 1 second tak chalegi
            once: true      // Animation sirf aik baar hogi jab user scroll karega
        });
    </script>

</body>
</html>
